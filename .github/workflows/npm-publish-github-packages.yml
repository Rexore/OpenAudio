name: Publish to npm

on:
  release:
    types: [published]  # triggers when you publish a release in GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create release notes
      packages: write   # needed to publish to npm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: |
          if [[ "${GITHUB_EVENT_RELEASE_TAG_NAME}" == *"-beta"* ]]; then
            npm publish --tag beta
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Log publish info
        run: |
          echo "Package: openaudio-suite"
          echo "Version: ${{ github.event.release.tag_name }}"
          echo "Published successfully!"
